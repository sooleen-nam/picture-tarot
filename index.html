<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>심리테스트 — 나는 어떤 사람일까?</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'HeirofLight';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/HeirofLightBold.woff') format('woff');
      font-weight: 700;
      font-display: swap;
    }
  </style>
  <style>
    @font-face {
      font-family: 'MapleStory';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@2.1/MaplestoryOTFBold.woff') format('woff');
      font-weight: bold;
      font-style: normal;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f8ff, #e6f4ff, #f5faff);
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
      color: #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      transition: background 0.7s ease;
    }

    .container {
      width: 100%;
      max-width: 920px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 프로그레스 ── */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .progress-track {
      flex: 1; height: 6px;
      background: rgba(0,0,0,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3196FF, #24BEF0);
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .progress-text { font-size: 0.85rem; color: #7878a8; white-space: nowrap; }

    /* ── 페이지 타이틀 ── */
    .page-title {
      font-size: 1.75rem; font-weight: 800; text-align: center;
      background: linear-gradient(90deg, #3196FF, #24BEF0);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .page-subtitle { font-size: 0.9rem; color: #7878a8; text-align: center; margin-bottom: 32px; }

    /* ── 카드 그리드 ── */
    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 34px;
      max-width: 634px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      position: relative;
      width: 148px;
      background: #ffffff;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      padding: 14px 10px 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      user-select: none;
      touch-action: manipulation;
    }
    .card:hover {
      border-color: #3196FF;
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(49,150,255,0.25);
    }
    @media (hover: none) {
      .card:hover {
        border-color: #e0e0e0;
        transform: none;
        box-shadow: none;
      }
    }
    .card.selected {
      background: #eef6ff;
      border-color: #3196FF;
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(49,150,255,0.35);
    }
    .card-img-wrap {
      width: 100%; aspect-ratio: 1;
      border-radius: 10px; overflow: hidden;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      mix-blend-mode: multiply;
      transform: scale(1.07);
    }
    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #bbb;
    }
    .card-label {
      font-size: 0.9rem; font-weight: 700;
      color: #333; text-align: center;
    }
    .card.selected .card-label { color: #1a7ae0; }

    .card .check-badge {
      display: none;
      position: absolute; top: 8px; right: 8px;
      width: 22px; height: 22px;
      background: #3196FF; border-radius: 50%;
      align-items: center; justify-content: center;
      font-size: 12px; color: #fff; font-weight: 900;
    }
    .card.selected .check-badge { display: flex; }

    /* ── 버튼 ── */
    .btn-wrap { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .btn-hist {
      padding: 12px 32px; font-size: 0.95rem; font-weight: 700;
      border: 2px solid #3196FF; border-radius: 50px;
      background: #fff; color: #3196FF; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.04em;
    }
    .btn-hist:hover { background: #3196FF; color: #fff; }

    /* ── 기록 화면 ── */
    .history-screen { padding: 24px 20px 60px; max-width: 700px; margin: 0 auto; }
    .history-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .history-title { font-size: 1.4rem; font-weight: 800; color: #2a3a50; }
    .hist-count { font-size: 0.85rem; color: #7890a8; margin-bottom: 16px; }
    .hist-btn {
      padding: 8px 16px; font-size: 0.82rem; font-weight: 700;
      border: 1.5px solid #3196FF; border-radius: 20px;
      background: #fff; color: #3196FF; cursor: pointer; transition: all 0.18s;
    }
    .hist-btn:hover { background: #3196FF; color: #fff; }
    .hist-btn-dl { border-color: #24BEF0; color: #24BEF0; }
    .hist-btn-dl:hover { background: #24BEF0; color: #fff; }
    .hist-btn-clear { border-color: #ff6b6b; color: #ff6b6b; }
    .hist-btn-clear:hover { background: #ff6b6b; color: #fff; }
    .hist-list { display: flex; flex-direction: column; gap: 10px; }
    .hist-row {
      background: #fff; border-radius: 14px;
      padding: 14px 18px; box-shadow: 0 2px 10px rgba(49,150,255,0.08);
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px;
    }
    .hist-date { font-size: 0.78rem; color: #9aabbb; flex-shrink: 0; }
    .hist-type { font-size: 1rem; font-weight: 700; color: #2a3a50; }
    .hist-cards { font-size: 0.8rem; color: #7890a8; flex: 1 1 100%; margin-top: 2px; }

    .btn {
      padding: 16px 56px; font-size: 1.1rem; font-weight: 700;
      border: none; border-radius: 50px;
      background: linear-gradient(135deg, #3196FF, #24BEF0);
      color: #fff; cursor: pointer;
      box-shadow: 0 6px 24px rgba(49,150,255,0.4);
      transition: all 0.2s; letter-spacing: 0.04em;
    }
    .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(49,150,255,0.5); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── 인트로 ── */
    .intro { text-align: center; padding: 20px 20px 50px; position: relative; }
    .intro-logo {
      position: absolute;
      top: 0; left: 0;
      width: 120px;
    }
    .character-wrap {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 520px;
    }
    .character-img {
      width: 200px;
      position: relative;
      z-index: 2;
      margin-bottom: -60px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
      transform-origin: 50% 85%;
      animation: handWave 1.8s ease-in-out infinite;
    }
    @keyframes handWave {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(6deg); }
      40%  { transform: rotate(-5deg); }
      60%  { transform: rotate(5deg); }
      80%  { transform: rotate(-4deg); }
      100% { transform: rotate(0deg); }
    }
    .bonus-banner {
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #eef6ff, #e0f0ff);
      border: 1.5px solid rgba(49,150,255,0.25);
      border-radius: 14px;
      padding: 12px 16px;
      margin-top: 31px;
      text-align: left;
    }
    .bonus-img {
      width: 88px; flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(49,150,255,0.2));
    }
    .bonus-text { font-size: 0.82rem; color: #3a4a70; line-height: 1.55; }
    .bonus-text strong { color: #3196FF; font-weight: 800; }
    .memo-paper {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border-radius: 20px;
      padding: 72px 36px 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .memo-paper::before {
      content: '';
      position: absolute;
      top: 14px; left: 50%; transform: translateX(-50%);
      width: 40px; height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
    }
    .intro-title {
      font-family: 'MapleStory', 'Pretendard', sans-serif;
      font-size: 2.8rem; font-weight: 900; line-height: 1.25;
      background: linear-gradient(90deg, #3196FF, #24BEF0, #3196FF);
      background-size: 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite; margin-bottom: 20px;
      letter-spacing: -0.01em;
      white-space: nowrap;
      filter: drop-shadow(0 2px 14px rgba(49,150,255,0.28));
    }
    @keyframes shine { to { background-position: 200% center; } }
    .intro-desc { font-size: 0.98rem; color: #5a6080; line-height: 1.9; margin-bottom: 28px; }

    /* ── 결과 ── */
    .result { text-align: center; }
    .result-mobile-top { display: none; }

    /* 상단: 캐릭터 + 메모 카드 */
    .result-header {
      display: flex;
      align-items: flex-end;
      gap: 0;
      margin-bottom: 28px;
    }
    .result-char-img {
      width: 88px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      margin-right: -20px;
      margin-bottom: 11px;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.13));
    }
    .result-memo {
      flex: 1;
      background: #ffffff;
      border-radius: 20px;
      padding: 22px 24px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .result-memo::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 5px;
      background: #e0e0e0; border-radius: 3px;
    }
    .result-label { font-size: 0.82rem; color: #7878a8; letter-spacing: 0.1em; margin-bottom: 4px; }
    .result-nickname { font-size: 0.9rem; font-weight: 700; color: #5a5a8a; letter-spacing: 0.05em; margin-bottom: 4px; }
    .nickname-wrap { margin-bottom: 14px; text-align: center; }
    .nickname-label { font-size: 0.82rem; color: #7878a8; display: block; margin-bottom: 8px; }
    .nickname-row { display: flex; justify-content: center; }
    .nickname-input { border: 2px solid #d8d8f0; border-radius: 20px; padding: 8px 18px; font-size: 0.95rem; font-family: inherit; color: #2a2a4a; outline: none; text-align: center; width: 180px; background: #fafaff; transition: border-color 0.2s; }
    .nickname-input:focus { border-color: #a0a0e0; }
    .nickname-input::placeholder { color: #b8b8d8; }
    .result-title {
      font-family: 'MapleStory', 'Pretendard', sans-serif;
      font-size: 2.5rem; font-weight: 900; margin-bottom: 14px; line-height: 1.2;
      background: linear-gradient(90deg, #3196FF, #24BEF0);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .keywords {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 6px;
    }
    .keyword {
      padding: 4px 12px; border-radius: 50px;
      background: rgba(49,150,255,0.1);
      border: 1px solid rgba(49,150,255,0.4);
      color: #1a7ae0; font-size: 0.8rem; font-weight: 700;
    }
    .result-desc {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px; padding: 22px 26px;
      font-size: 0.98rem; color: #4a5068;
      line-height: 1.85; text-align: left; margin-bottom: 32px;
      white-space: pre-line;
    }
    .result-picks-title {
      font-size: 1rem; font-weight: 700;
      color: #1a7ae0; margin-bottom: 20px;
      letter-spacing: 0.05em;
    }
    .result-picks {
      display: flex; justify-content: center;
      flex-wrap: wrap; gap: 20px; margin-bottom: 36px;
    }
    .pick {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .pick-img-wrap {
      width: 130px; height: 130px;
      border-radius: 14px; overflow: hidden;
      background: #fff;
      border: 3px solid rgba(49,150,255,0.5);
      box-shadow: 0 6px 18px rgba(49,150,255,0.18);
      display: flex; align-items: center; justify-content: center;
    }
    .pick-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      mix-blend-mode: multiply;
      transform: scale(1.07);
    }
    .pick-label { font-size: 0.9rem; font-weight: 700; color: #2a2a4a; }
    .pick-page { font-size: 0.72rem; color: #888; }

    /* ── 타로 카드 ── */
    .tarot-section {
      border-radius: 20px;
      padding: 22px 20px 24px;
      margin-bottom: 32px;
      text-align: center;
    }
    .tarot-title {
      font-family: 'MapleStory', 'Pretendard', sans-serif;
      font-size: 1rem; font-weight: 800;
      letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .tarot-subtitle {
      font-size: 0.76rem; color: #aaa; margin-bottom: 20px;
    }
    .tarot-cards {
      display: flex; justify-content: center; gap: 14px;
    }
    .tarot-card {
      width: 136px;
      perspective: 700px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .tarot-card-inner {
      position: relative;
      width: 100%; height: 196px;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tarot-card.flipped .tarot-card-inner { transform: rotateY(180deg); }
    .tarot-face {
      position: absolute; inset: 0;
      border-radius: 13px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 8px;
    }
    .tarot-front-face { transform: rotateY(180deg); justify-content: flex-start; padding: 14px 12px 12px; }
    .tarot-inner-border {
      position: absolute; inset: 6px;
      border-radius: 8px;
      pointer-events: none;
    }
    .tarot-symbol {
      font-size: 1.9rem; margin-bottom: 10px; line-height: 1;
    }
    .tarot-card-name {
      font-size: 0.82rem; font-weight: 800; letter-spacing: 0.06em; color: #fff;
    }
    .tarot-hint {
      font-size: 0.6rem; margin-top: 6px; opacity: 0.65; color: #fff;
    }
    .tarot-front-q {
      font-family: 'HeirofLight', 'Nanum Myeongjo', serif;
      font-size: 0.62rem;
      line-height: 1.7; text-align: center; color: #aaa;
      flex-shrink: 0;
    }
    .tarot-value-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      border-top: 1px solid rgba(0,0,0,0.08);
      margin-top: 10px;
      padding: 8px 2px 0;
      width: 100%;
    }
    .tarot-front-value {
      font-family: 'HeirofLight', 'Nanum Myeongjo', serif;
      font-size: 1.05rem; font-weight: 700; line-height: 1.5;
      text-align: center; word-break: keep-all;
    }

    /* ── 피드백 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.38);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      animation: fadeIn 0.2s ease;
    }
    .modal-box {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px 28px;
      width: 90%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      animation: fadeIn 0.25s ease;
    }
    .feedback-q {
      font-size: 1.35rem; font-weight: 800; text-align: center;
      background: linear-gradient(90deg, #3196FF, #24BEF0);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.6; margin-bottom: 24px;
    }
    .feedback-scale {
      display: flex; flex-direction: column; gap: 10px;
    }
    .feedback-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; border: 2px solid #cce4ff;
      border-radius: 50px; background: #fff;
      cursor: pointer; transition: all 0.18s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .feedback-btn:hover {
      border-color: #3196FF;
      background: #eef6ff;
      transform: translateX(5px);
      box-shadow: 0 4px 14px rgba(49,150,255,0.18);
    }
    .feedback-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3196FF, #24BEF0);
      color: #fff; font-size: 0.82rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .feedback-label {
      font-size: 0.95rem; font-weight: 700; color: #2a2a4a;
    }

    /* ── 모바일 반응형 ── */
    @media (max-width: 480px) {
      body { padding: 20px 14px; }

      /* 인트로 */
      .intro { padding: 16px 10px 36px; }
      .intro-logo { width: 80px; }
      .intro-title { font-size: 1.9rem; white-space: normal; }
      .intro-desc { font-size: 0.88rem; }
      .character-img { width: 150px; margin-bottom: -44px; }
      .memo-paper { padding: 52px 20px 24px; }
      .character-wrap { max-width: 100%; }
      .bonus-img { width: 60px; }
      .bonus-text { font-size: 0.65rem; line-height: 1.45; word-break: keep-all; }
      .bonus-banner { padding: 10px 12px; gap: 8px; }

      /* 퀴즈 카드 */
      .page-title { font-size: 1.3rem; }
      .page-subtitle { font-size: 0.82rem; margin-bottom: 20px; }
      .cards-grid { gap: 10px; max-width: 100%; }
      .card { width: 130px; padding: 10px 8px 10px; }
      .card-label { font-size: 0.82rem; }
      .btn { padding: 14px 40px; font-size: 1rem; }

      /* 결과 — 모바일 이미지 제거 */
      .result-mobile-top { display: none; }
      .result-char-img { display: none; }
      .result-header { justify-content: center; }
      .result-title { font-size: 1.5rem; }
      .result-memo { padding: 16px 12px; }
      .result-desc { padding: 14px 14px; font-size: 0.86rem; word-break: keep-all; }
      .result-picks-title { font-size: 0.88rem; }
      .result-picks { gap: 8px; flex-wrap: nowrap; justify-content: center; }
      .pick { width: calc(25% - 6px); }
      .pick-img-wrap { width: 100%; height: auto; aspect-ratio: 1; }
      .pick-label { font-size: 0.72rem; }
      .pick-page { font-size: 0.62rem; }

      /* 키워드 3+2 동일 너비 */
      .keywords { gap: 6px; }
      .keywords .keyword {
        flex: 0 0 calc(33.33% - 4px);
        text-align: center;
        box-sizing: border-box;
        padding: 5px 6px;
      }

      /* 타로 카드 */
      .tarot-cards { gap: 8px; }
      .tarot-card { width: 100px; }
      .tarot-card-inner { height: 155px; }
      .tarot-face { padding: 8px 6px; }
      .tarot-front-face { padding: 10px 8px 8px; }
      .tarot-symbol { font-size: 1.4rem; margin-bottom: 7px; }
      .tarot-card-name { font-size: 0.7rem; }
      .tarot-hint { font-size: 0.52rem; }
      .tarot-front-q { font-size: 0.52rem; line-height: 1.55; }
      .tarot-value-wrap { overflow-y: auto; -webkit-overflow-scrolling: touch; margin-top: 7px; padding: 6px 2px 0; }
      .tarot-front-value { font-size: 0.75rem; line-height: 1.45; }
      .tarot-title { font-size: 0.88rem; }
      .tarot-section { padding: 16px 10px 16px; }
    }

    /* ── 구름 배경 ── */
    .cloud-bg {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .container { position: relative; z-index: 1; }

    /* 배경 그라데이션 흐름 */
    .intro-sky {
      position: absolute; inset: 0;
      background: linear-gradient(
        -45deg,
        #7ec5e8, #a8d0f4, #f9c5da,
        #c8b8ec, #b8e4fa, #f0b0cc,
        #90ccf2, #d4b8f0, #7ec5e8
      );
      background-size: 500% 500%;
      animation: skyMorph 20s ease infinite;

function getResult() {
  const s = totalScores;
  const e1 = s.energy  >= s.stability   ? 'E' : 'S';
  const e2 = s.social  >= s.analytical  ? 'R' : 'A';
  const e3 = s.creativity >= s.leadership ? 'C' : 'L';
  const e4 = s.freedom >= s.sensitivity ? 'F' : 'M';
  const code = e1 + e2 + e3 + e4;
  return resultTypes.find(r => r.key === code) || resultTypes[0];
}

const STORAGE_KEY = 'pictureTarotHistory';

function saveResult(r) {
  const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const entry = {
    date: dateStr,
    resultKey: r.key,
    resultTitle: r.title,
    resultEmoji: r.emoji || '',
    selectedCardLabels: selectedCards.map((cardIdx, pageIdx) => pages[pageIdx].cards[cardIdx].label),
    scores: { ...totalScores },
  };
  history.unshift(entry); // 최신 순
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function getHistory() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function downloadCSV() {
  const history = getHistory();
  if (!history.length) { alert('저장된 기록이 없습니다.'); return; }
  const headers = ['날짜', '결과 유형', '선택한 카드들', '에너지', '창의성', '안정', '사교성', '리더십', '자유', '감수성', '분석'];
  const rows = history.map(h => [
    h.date,
    h.resultTitle,
    (h.selectedCardLabels || []).join(' / '),
    h.scores.energy || 0,
    h.scores.creativity || 0,
    h.scores.stability || 0,
    h.scores.social || 0,
    h.scores.leadership || 0,
    h.scores.freedom || 0,
    h.scores.sensitivity || 0,
    h.scores.analytical || 0,
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `그림타로_기록_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

  setBg(introBg);

    : history.map((h, i) => `

        <div class="hist-type">${h.resultTitle}</div>

      </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="history-screen">
      <div class="history-header">
        <h2 class="history-title">📋 내 기록</h2>

    </div>`;
}

function triggerColorEffect(cardEl, colorLabel) {
  const effect = colorEffects[colorLabel];
  if (!effect) return;

  const rect = cardEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = 22;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    const shape = effect.shapes[Math.floor(Math.random() * effect.shapes.length)];
    const color = effect.colors[Math.floor(Math.random() * effect.colors.length)];
    const size = 14 + Math.random() * 26;
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.6;
    const dist = 80 + Math.random() * 130;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const duration = 700 + Math.random() * 500;
    const delay = Math.random() * 180;
    const rotate = (Math.random() - 0.5) * 540;

    el.style.cssText = `
      position:fixed;
      left:${cx}px; top:${cy}px;
      font-size:${size}px;
      color:${color};
      pointer-events:none;
      z-index:9999;
      user-select:none;
      transform:translate(-50%,-50%) rotate(0deg) scale(1);
      opacity:1;
      transition:transform ${duration}ms cubic-bezier(.2,.8,.4,1) ${delay}ms,
                 opacity ${duration * 0.6}ms ease ${delay + duration * 0.4}ms;
      will-change:transform,opacity;
      line-height:1;
      text-shadow: 0 2px 8px ${color}88;
    `;
    el.textContent = shape;
    document.body.appendChild(el);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${rotate}deg) scale(${0.4 + Math.random() * 0.8})`;
        el.style.opacity = '0';
      });
    });

    setTimeout(() => el.remove(), duration + delay + 100);
  }

  // 카드 자체 펄스 효과
  cardEl.style.transition = 'transform 0.15s ease';
  cardEl.style.transform = 'scale(1.1)';
  setTimeout(() => { cardEl.style.transform = ''; }, 200);
}

function selectCard(idx) {
  if (_blockSelect) return;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  const cardEl = document.getElementById(`card-${idx}`);
  cardEl.classList.add('selected');
  selectedCards[currentPage] = idx;
  document.getElementById('nextBtn').disabled = false;

  // 1페이지(색 선택) 파티클 효과
  if (currentPage === 0) {
    const label = pages[0].cards[idx].label;
    triggerColorEffect(cardEl, label);
  }
  // 2페이지(도형 선택) 응원 팝업

    showCheerPopup('좋아요! 잘 고르고 있어요!\n점점 더 당신을 알아가는 중이에요!');

  if (currentPage === 2) {
    triggerItemEffect(cardEl, pages[2].cards[idx].label);
  }
}

let _itemVolume = 1.0;
let _audioCtx = null;
function _getAC() {
  try {
    if (!_audioCtx || _audioCtx.state === 'closed')
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    return _audioCtx;
  } catch(e) { return null; }
}
function _playTone(freq, dur, type, vol) {
  const ac = _getAC(); if (!ac) return;
  try {
    const osc = ac.createOscillator(), gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime((vol || 0.25) * _itemVolume, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function _playNoise(dur, filterFreq, vol) {
  const ac = _getAC(); if (!ac) return;
  try {
    const n = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, n, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource(); src.buffer = buf;
    const flt = ac.createBiquadFilter(); flt.type = 'bandpass';
    flt.frequency.setValueAtTime(filterFreq, ac.currentTime); flt.Q.value = 2;
    const gain = ac.createGain();
    gain.gain.setValueAtTime((vol || 0.1) * _itemVolume, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    src.connect(flt); flt.connect(gain); gain.connect(ac.destination);
    src.start(); src.stop(ac.currentTime + dur);
  } catch(e) {}
}
function playItemSound(type) {
  try {
    const ac = _getAC(); if (!ac) return;
    switch (type) {
      case 'click':
        _playTone(800, 0.08, 'sine', 0.3); break;
      case 'whoosh': {
        const n = Math.floor(ac.sampleRate * 0.45);
        const buf = ac.createBuffer(1, n, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * (1 - i/n);
        const src = ac.createBufferSource(); src.buffer = buf;
        const flt = ac.createBiquadFilter(); flt.type = 'bandpass';
        flt.frequency.setValueAtTime(200, ac.currentTime);
        flt.frequency.exponentialRampToValueAtTime(3000, ac.currentTime + 0.45);
        flt.Q.value = 3;
        const g = ac.createGain(); g.gain.setValueAtTime(0.22 * _itemVolume, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.45);
        src.connect(flt); flt.connect(g); g.connect(ac.destination);
        src.start(); src.stop(ac.currentTime + 0.45); break;
      }
      case 'pageflip':
        _playNoise(0.12, 3500, 0.18);
        setTimeout(() => _playNoise(0.1, 4200, 0.15), 90);
        setTimeout(() => _playNoise(0.08, 5000, 0.12), 170); break;
      case 'zipper': {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(250, ac.currentTime);
        osc.frequency.linearRampToValueAtTime(2200, ac.currentTime + 0.5);
        g.gain.setValueAtTime(0.1 * _itemVolume, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
        osc.start(); osc.stop(ac.currentTime + 0.5); break;
      }
      case 'rain':
        _playNoise(1.2, 1200, 0.07);
        for (let i = 0; i < 7; i++)
          setTimeout(() => _playTone(300+Math.random()*500, 0.07, 'sine', 0.05), i*100);
        break;
      case 'clock':
        for (let i = 0; i < 14; i++)
          setTimeout(() => { _playTone(1400, 0.035, 'square', 0.1); }, i*52);
        break;
      case 'sit':
        _playTone(72, 0.45, 'sine', 0.5);
        _playNoise(0.2, 180, 0.22); break;
      case 'footstep':
        _playTone(140, 0.18, 'sine', 0.35);
        setTimeout(() => _playNoise(0.12, 280, 0.18), 50); break;
      case 'glint':
        _playTone(1800, 0.1, 'sine', 0.18);
        setTimeout(() => _playTone(2400, 0.1, 'sine', 0.15), 80);
        setTimeout(() => _playTone(3200, 0.2, 'sine', 0.2), 160); break;
    }
  } catch(e) {}
}

  _playItemSpecificSound(label);

function _playItemSpecificSound(label) {
  const ac = _getAC();
  if (!ac) return;

  switch (label) {

    case '책': { // 책장 넘기는 종이 소리
      const numPages = 14;
      for (let i = 0; i < numPages; i++) {
        const t = (i / numPages) * 2800 + Math.random() * 80;
        setTimeout(() => {
          const dur = 0.055 + Math.random() * 0.045;
          const n = Math.floor(ac.sampleRate * dur);
          const buf = ac.createBuffer(1, n, ac.sampleRate);
          const d = buf.getChannelData(0);
          for (let j = 0; j < n; j++) d[j] = Math.random() * 2 - 1;
          const src = ac.createBufferSource(); src.buffer = buf;
          const flt = ac.createBiquadFilter(); flt.type = 'bandpass';
          flt.frequency.value = 3200 + Math.random() * 2200; flt.Q.value = 0.7;
          const g = ac.createGain();
          g.gain.setValueAtTime(0.32 * _itemVolume, ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
          src.connect(flt); flt.connect(g); g.connect(ac.destination);
          src.start(); src.stop(ac.currentTime + dur);
        }, t);
      }
      break;
    }

    case '가방': { // 지퍼 열리는 소리
      const numTicks = 50;
      for (let i = 0; i < numTicks; i++) {
        const t = (i / numTicks) * 2600;
        setTimeout(() => {
          const dur = 0.022;
          const freq = 600 + (i / numTicks) * 3400;
          const n = Math.floor(ac.sampleRate * dur);
          const buf = ac.createBuffer(1, n, ac.sampleRate);
          const d = buf.getChannelData(0);
          for (let j = 0; j < n; j++) d[j] = Math.random() * 2 - 1;
          const src = ac.createBufferSource(); src.buffer = buf;
          const flt = ac.createBiquadFilter(); flt.type = 'bandpass';
          flt.frequency.value = freq; flt.Q.value = 6;
          const g = ac.createGain();
          g.gain.setValueAtTime(0.22 * _itemVolume, ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
          src.connect(flt); flt.connect(g); g.connect(ac.destination);
          src.start(); src.stop(ac.currentTime + dur);
        }, t);
      }
      break;
    }

    case '우산': { // 비가 우산에 닿는 소리
      // 배경 빗소리
      const rn = Math.floor(ac.sampleRate * 3.0);
      const rbuf = ac.createBuffer(1, rn, ac.sampleRate);
      const rd = rbuf.getChannelData(0);
      for (let i = 0; i < rn; i++) rd[i] = Math.random() * 2 - 1;
      const rsrc = ac.createBufferSource(); rsrc.buffer = rbuf;
      const rflt = ac.createBiquadFilter(); rflt.type = 'bandpass';
      rflt.frequency.value = 900; rflt.Q.value = 0.8;
      const rg = ac.createGain(); rg.gain.setValueAtTime(0.09 * _itemVolume, ac.currentTime);
      rsrc.connect(rflt); rflt.connect(rg); rg.connect(ac.destination);
      rsrc.start(); rsrc.stop(ac.currentTime + 3.0);
      // 개별 빗방울이 우산 캔버스에 닿는 소리
      for (let i = 0; i < 30; i++) {
        const delay = Math.random() * 3000;
        setTimeout(() => {
          const dur = 0.035 + Math.random() * 0.035;
          const dn = Math.floor(ac.sampleRate * dur);
          const dbuf = ac.createBuffer(1, dn, ac.sampleRate);
          const dd = dbuf.getChannelData(0);
          for (let j = 0; j < dn; j++) dd[j] = Math.random() * 2 - 1;
          const dsrc = ac.createBufferSource(); dsrc.buffer = dbuf;
          const dflt = ac.createBiquadFilter(); dflt.type = 'bandpass';
          dflt.frequency.value = 350 + Math.random() * 700; dflt.Q.value = 3;
          const dg = ac.createGain();
          dg.gain.setValueAtTime(0.28 * _itemVolume, ac.currentTime);
          dg.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
          dsrc.connect(dflt); dflt.connect(dg); dg.connect(ac.destination);
          dsrc.start(); dsrc.stop(ac.currentTime + dur);
        }, delay);
      }
      break;
    }

    case '시계': { // 째깍째깍 시계 소리
      for (let i = 0; i < 6; i++) {
        setTimeout(() => {
          const isTick = i % 2 === 0;
          // 기계음 충격
          const osc = ac.createOscillator();
          const og = ac.createGain();
          osc.connect(og); og.connect(ac.destination);
          osc.type = 'square';
          osc.frequency.value = isTick ? 1300 : 900;
          og.gain.setValueAtTime(0.12 * _itemVolume, ac.currentTime);
          og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.03);
          osc.start(); osc.stop(ac.currentTime + 0.03);
          // 클릭 노이즈
          const nn = Math.floor(ac.sampleRate * 0.02);
          const nbuf = ac.createBuffer(1, nn, ac.sampleRate);
          const nd = nbuf.getChannelData(0);
          for (let j = 0; j < nn; j++) nd[j] = Math.random() * 2 - 1;
          const nsrc = ac.createBufferSource(); nsrc.buffer = nbuf;
          const nflt = ac.createBiquadFilter(); nflt.type = 'highpass'; nflt.frequency.value = 1800;
          const ng = ac.createGain();
          ng.gain.setValueAtTime(0.18 * _itemVolume, ac.currentTime);
          ng.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.02);
          nsrc.connect(nflt); nflt.connect(ng); ng.connect(ac.destination);
          nsrc.start(); nsrc.stop(ac.currentTime + 0.02);
        }, i * 500);
      }
      break;
    }

    case '의자': { // 의자 삐그덕 소리
      [0, 1100, 2200].forEach((delay, idx) => {
        setTimeout(() => {
          const dur = 0.55 + Math.random() * 0.2;
          const n = Math.floor(ac.sampleRate * dur);
          const buf = ac.createBuffer(1, n, ac.sampleRate);
          const d = buf.getChannelData(0);
          for (let j = 0; j < n; j++) {
            const env = Math.sin(Math.PI * j / n);
            d[j] = (Math.random() * 2 - 1) * env;
          }
          const src = ac.createBufferSource(); src.buffer = buf;
          const flt = ac.createBiquadFilter(); flt.type = 'bandpass';
          flt.frequency.value = 130 + idx * 30; flt.Q.value = 4;
          const g = ac.createGain();
          g.gain.setValueAtTime(0.38 * _itemVolume, ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
          src.connect(flt); flt.connect(g); g.connect(ac.destination);
          src.start(); src.stop(ac.currentTime + dur);
        }, delay);
      });
      break;
    }

    case '신발': { // 뛰는 발자국 소리
      const stepMs = 340;
      const numSteps = Math.floor(3000 / stepMs);
      for (let i = 0; i < numSteps; i++) {
        setTimeout(() => {
          // 저주파 쿵 소리
          const osc = ac.createOscillator();
          const og = ac.createGain();
          osc.connect(og); og.connect(ac.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(110, ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(55, ac.currentTime + 0.1);
          og.gain.setValueAtTime(0.55 * _itemVolume, ac.currentTime);
          og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
          osc.start(); osc.stop(ac.currentTime + 0.1);
          // 바닥 마찰 소리
          const nn = Math.floor(ac.sampleRate * 0.07);
          const nbuf = ac.createBuffer(1, nn, ac.sampleRate);
          const nd = nbuf.getChannelData(0);
          for (let j = 0; j < nn; j++) nd[j] = Math.random() * 2 - 1;
          const nsrc = ac.createBufferSource(); nsrc.buffer = nbuf;
          const nflt = ac.createBiquadFilter(); nflt.type = 'bandpass';
          nflt.frequency.value = 450; nflt.Q.value = 2;
          const ng = ac.createGain();
          ng.gain.setValueAtTime(0.18 * _itemVolume, ac.currentTime);
          ng.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.07);
          nsrc.connect(nflt); nflt.connect(ng); ng.connect(ac.destination);
          nsrc.start(); nsrc.stop(ac.currentTime + 0.07);
        }, i * stepMs);
      }
      break;
    }

    case '거울': { // 거울 닦는 소리
      // 앞뒤로 닦는 마찰음 (진폭 변조 노이즈)
      const wn = Math.floor(ac.sampleRate * 3.0);
      const wbuf = ac.createBuffer(1, wn, ac.sampleRate);
      const wd = wbuf.getChannelData(0);
      for (let i = 0; i < wn; i++) {
        const env = 0.5 + 0.5 * Math.sin(2 * Math.PI * 2.5 * i / ac.sampleRate);
        wd[i] = (Math.random() * 2 - 1) * env;
      }
      const wsrc = ac.createBufferSource(); wsrc.buffer = wbuf;
      const wflt = ac.createBiquadFilter(); wflt.type = 'bandpass';
      wflt.frequency.value = 2800; wflt.Q.value = 1.2;
      const wg = ac.createGain(); wg.gain.setValueAtTime(0.14 * _itemVolume, ac.currentTime);
      wsrc.connect(wflt); wflt.connect(wg); wg.connect(ac.destination);
      wsrc.start(); wsrc.stop(ac.currentTime + 3.0);
      // 유리 끽 소리 (주기적)
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const dur = 0.12;
          const osc = ac.createOscillator();
          const og = ac.createGain();
          osc.connect(og); og.connect(ac.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(1700, ac.currentTime);
          osc.frequency.linearRampToValueAtTime(2300, ac.currentTime + dur / 2);
          osc.frequency.linearRampToValueAtTime(1700, ac.currentTime + dur);
          og.gain.setValueAtTime(0.07 * _itemVolume, ac.currentTime);
          og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
          osc.start(); osc.stop(ac.currentTime + dur);
        }, 200 + i * 580);
      }
      break;
    }
  }
}

    }

  } else if (label === '하트') {
    // 무지개 하트가 위로 떠오름
    const hearts = ['❤️','🧡','💛','💚','💙','💜','🩷','🤍'];
    for (let i = 0; i < 14; i++) {
      const el = document.createElement('div');
      const size = 16 + Math.random() * 24;
      const startX = cx + (Math.random()-0.5) * 120;
      const floatX = (Math.random()-0.5) * 60;
      const dur = 900 + Math.random() * 600;
      el.style.cssText = `
        position:fixed; left:${startX}px; top:${cy}px;
        font-size:${size}px; line-height:1;
        pointer-events:none; z-index:9999;
        transform:translate(-50%,-50%) translateY(0px) translateX(0px);
        opacity:1;
        transition:transform ${dur}ms cubic-bezier(.3,.7,.4,1) ${i*50}ms,
                   opacity ${dur*0.4}ms ease ${dur*0.6+i*50}ms;
      `;
      el.textContent = hearts[i % hearts.length];
      document.body.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transform = `translate(-50%,-50%) translateY(-${120+Math.random()*80}px) translateX(${floatX}px)`;
        el.style.opacity = '0';
      }));
      setTimeout(() => el.remove(), dur + i*50 + 200);
    }

  } else if (label === '별') {
    // 별똥별 빛줄기
    const count = 14;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      const angle = (Math.PI * 2 / count) * i;
      const dist = 80 + Math.random() * 120;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      const size = 6 + Math.random() * 10;
      const tailLen = 20 + Math.random() * 30;
      const color = `hsl(${45+Math.random()*30},100%,${60+Math.random()*20}%)`;
      // 꼬리
      const tail = document.createElement('div');
      tail.style.cssText = `
        position:fixed; left:${cx}px; top:${cy}px;
        width:${tailLen}px; height:${size*0.4}px;
        background:linear-gradient(90deg,${color},transparent);
        border-radius:${size}px;
        pointer-events:none; z-index:9998;
        transform-origin:left center;
        transform:translate(-50%,-50%) rotate(${Math.atan2(ty,tx)*180/Math.PI}deg) scaleX(0);
        opacity:0.8;
        transition:transform 0.5s ease ${i*25}ms, opacity 0.3s ease ${0.3+i*0.025}s;
      `;
      document.body.appendChild(tail);
      // 별
      el.style.cssText = `
        position:fixed; left:${cx}px; top:${cy}px;
        font-size:${size+8}px; line-height:1;
        pointer-events:none; z-index:9999;
        transform:translate(-50%,-50%);
        opacity:1;
        transition:transform 0.55s cubic-bezier(.2,.8,.3,1) ${i*25}ms,
                   opacity 0.3s ease ${0.3+i*0.025}s;
      `;
      el.textContent = '⭐';
      document.body.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
        el.style.opacity = '0';
        tail.style.transform = `translate(-50%,-50%) rotate(${Math.atan2(ty,tx)*180/Math.PI}deg) scaleX(1)`;
        tail.style.opacity = '0';
      }));
      setTimeout(() => { el.remove(); tail.remove(); }, 800);
    }

  } else if (label === '번개') {
    // 번개 지그재그 방사형
    const count = 8;
    for (let i = 0; i < count; i++) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      const angle = (Math.PI * 2 / count) * i;
      const dist = 60 + Math.random() * 90;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      const w = 20, h = 40;
      svg.setAttribute('width', w); svg.setAttribute('height', h);
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M12 2 L6 18 L11 18 L8 38 L18 14 L13 14 Z');
      path.setAttribute('fill',`hsl(${45+Math.random()*20},100%,60%)`);
      path.setAttribute('stroke','#fff'); path.setAttribute('stroke-width','0.5');
      svg.appendChild(path);
      svg.style.cssText = `
        position:fixed; left:${cx}px; top:${cy}px;
        pointer-events:none; z-index:9999;
        transform:translate(-50%,-50%) rotate(${angle*180/Math.PI+90}deg) scale(1);
        opacity:1;
        transition:transform 0.6s cubic-bezier(.2,.8,.3,1) ${i*40}ms,
                   opacity 0.3s ease ${0.35+i*0.04}s;
        filter:drop-shadow(0 0 6px #FFD600);
      `;
      document.body.appendChild(svg);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        svg.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${angle*180/Math.PI+90}deg) scale(0.5)`;
        svg.style.opacity = '0';
      }));
      setTimeout(() => svg.remove(), 900);
    }
    // 번쩍 플래시
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:fixed; left:${cx}px; top:${cy}px;
      width:10px; height:10px; border-radius:50%;
      background:radial-gradient(circle,#fff,#FFD600,transparent);
      transform:translate(-50%,-50%) scale(0);
      pointer-events:none; z-index:9998;
      transition:transform 0.15s ease, opacity 0.3s ease 0.15s;
    `;
    document.body.appendChild(flash);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      flash.style.transform = 'translate(-50%,-50%) scale(18)';
      flash.style.opacity = '0';
    }));
    setTimeout(() => flash.remove(), 600);

  } else if (label === '구름') {
    // 솜사탕 구름 둥실둥실
    const clouds = ['☁️','🌥️','⛅','🌤️'];
    for (let i = 0; i < 10; i++) {
      const el = document.createElement('div');
      const size = 20 + Math.random() * 26;
      const startX = cx + (Math.random()-0.5) * 160;
      const dur = 1000 + Math.random() * 500;
      const floatX = (Math.random()-0.5)*80;
      el.style.cssText = `
        position:fixed; left:${startX}px; top:${cy}px;
        font-size:${size}px; line-height:1;
        pointer-events:none; z-index:9999;
        transform:translate(-50%,-50%) translateY(0) translateX(0) scale(0.3);
        opacity:0;
        transition:transform ${dur}ms cubic-bezier(.2,.8,.3,1) ${i*60}ms,
                   opacity 0.2s ease ${i*60}ms;
      `;
      el.textContent = clouds[i % clouds.length];
      document.body.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transform = `translate(-50%,-50%) translateY(-${80+Math.random()*60}px) translateX(${floatX}px) scale(1)`;
        el.style.opacity = '1';
      }));
      setTimeout(() => {
        el.style.transition = `opacity 0.5s ease`;
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 600);
      }, dur + i*60 - 400);
    }
  }

  // 카드 펄스
  cardEl.style.transition = 'transform 0.15s ease';
  cardEl.style.transform = 'scale(1.08)';
  setTimeout(() => { cardEl.style.transform = ''; }, 200);
}

function nextPage() {
  dismissCheerPopup();
  dismissItemEffect();
  if (selectedCards[currentPage] === undefined) return;
  const card = pages[currentPage].cards[selectedCards[currentPage]];
  Object.entries(card.scores).forEach(([k, v]) => { totalScores[k] += v; });
  currentPage++;
  if (currentPage >= pages.length) renderResult();
  else renderPage(currentPage);
}

function startQuizWithNickname() {
  const input = document.getElementById('nicknameInput');
  const name = input ? input.value.trim() : '';
  if (!name) {
    showNicknameAlert();
    if (input) input.focus();
    return;
  }
  saveNickname(name);
  startQuiz();
}

function showNicknameAlert() {
  if (document.getElementById('nickname-alert')) return;
  const el = document.createElement('div');
  el.id = 'nickname-alert';
  el.style.cssText = `
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.88);
    background:#fff;border-radius:24px;padding:36px 32px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.18);z-index:9999;
    text-align:center;width:300px;
    opacity:0;transition:all 0.22s cubic-bezier(.34,1.56,.64,1);
  `;
  el.innerHTML = `
    <p style="font-size:1rem;font-weight:700;color:#2a2a4a;line-height:1.6;margin-bottom:22px;">
      당신을 더 친근하게 부르고 싶어요.<br>닉네임을 써주세요!
    </p>
    <button onclick="closeNicknameAlert()" style="
      background:linear-gradient(135deg,#a0a0e8,#7878c8);color:#fff;border:none;
      border-radius:14px;padding:12px 32px;font-size:0.95rem;font-weight:700;
      cursor:pointer;font-family:inherit;
    ">닉네임 쓰러 가기</button>
  `;
  const overlay = document.createElement('div');
  overlay.id = 'nickname-alert-overlay';
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:9998;backdrop-filter:blur(2px);`;
  overlay.onclick = closeNicknameAlert;
  document.body.appendChild(overlay);
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    el.style.transform = 'translate(-50%,-50%) scale(1)';
  });
}

function closeNicknameAlert() {
  const el = document.getElementById('nickname-alert');
  const overlay = document.getElementById('nickname-alert-overlay');
  if (el) { el.style.opacity='0'; el.style.transform='translate(-50%,-50%) scale(0.88)'; setTimeout(()=>el.remove(),220); }
  if (overlay) overlay.remove();
  const input = document.getElementById('nicknameInput');
  if (input) input.focus();
}

function startQuiz() {
  currentPage = 0;
  selectedCards = [];
  resetScores();
  renderPage(0);
}

function renderResult() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  hideCloudBg();
  const r = getResult();
  saveResult(r);
  setBg(r.colors.bg);

  const c = r.colors;
  const titleStyle = `background:linear-gradient(90deg,${c.c1},${c.c2});-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;`;
  const kwStyle = `background:${c.kbg};border:1px solid ${c.kborder};color:${c.ktext};`;

  const fortune = getTodayFortune(r.key, selectedCards);

  const picksHTML = selectedCards.map((cardIdx, pageIdx) => {
    const card = pages[pageIdx].cards[cardIdx];
    return `<div class="pick">
      <div class="pick-img-wrap" style="border-color:${c.c1}80;box-shadow:0 6px 18px ${c.c1}25;">
        <img src="${card.img}" alt="${card.label}"
          onerror="this.parentElement.style.background='#f0f0f0'"/>
      </div>
      <span class="pick-label">${card.label}</span>
      <span class="pick-page">${pageIdx+1}번 질문</span>
    </div>`;
  }).join('');

  const keywordsHTML = r.keywords.map(k => `<span class="keyword" style="${kwStyle}"># ${k}</span>`).join('');

  const nickname = getNickname();
  const nameTag = nickname ? `<div class="result-nickname">${nickname} 님의 유형은</div>` : `<div class="result-label">당신의 유형은</div>`;

  document.getElementById('app').innerHTML = `
    <div class="result">
      <div class="result-mobile-top">
        <img src="images/character/배경이미지.png" alt="캐릭터"/>
      </div>
      <div class="result-header">
        <img class="result-char-img" src="images/character/배경이미지2.webp" alt="캐릭터"/>
        <div class="result-memo">
          ${nameTag}
          <div class="result-title" style="${titleStyle}">${r.title}</div>
          <div class="keywords">${keywordsHTML}</div>
        </div>
      </div>
      <p class="result-picks-title" style="color:${c.c1}">✦ 선택한 카드 다시보기 ✦</p>
      <div class="result-picks">${picksHTML}</div>
      <div class="result-desc" style="border-left:4px solid ${c.c1}40;">${r.desc}</div>
      <div class="tarot-section" style="border:2px solid ${c.c1}30; background:${c.kbg};">
        <div class="tarot-title" style="color:${c.c1}">${nickname ? nickname + '님만을 위한 그림 타로 카드!' : '그림 타로! 오늘의 행운은?'}</div>
        <p class="tarot-subtitle">${nickname ? '오늘의 행운을 확인해보세요.' : '카드를 한 장씩 뒤집어 보세요'}</p>
        <div class="tarot-cards">
          <div class="tarot-card" id="tcard-0" onclick="flipTarot(0)">
            <div class="tarot-card-inner">
              <div class="tarot-face tarot-back-face" style="background:${c.c1};">
                <div class="tarot-inner-border" style="border:1px solid ${c.c2}50;"></div>
                <div class="tarot-symbol" style="color:${c.c2};">☽</div>
                <div class="tarot-card-name">카드 A</div>
                <div class="tarot-hint">탭하여 확인</div>
              </div>
              <div class="tarot-face tarot-front-face" style="background:#fff; box-shadow:inset 0 0 0 2px ${c.c1}30;">
                <div class="tarot-inner-border" style="border:1px solid ${c.c1}25;"></div>
                <div class="tarot-front-q">오늘 행운이<br>찾아오는 시각은</div>
                <div class="tarot-value-wrap">
                  <div class="tarot-front-value" style="color:${c.c1};">${fortune.luckyTime}</div>
                </div>
              </div>
            </div>
          </div>
          <div class="tarot-card" id="tcard-1" onclick="flipTarot(1)">
            <div class="tarot-card-inner">
              <div class="tarot-face tarot-back-face" style="background:${c.c1};">
                <div class="tarot-inner-border" style="border:1px solid ${c.c2}50;"></div>
                <div class="tarot-symbol" style="color:${c.c2};">✦</div>
                <div class="tarot-card-name">카드 B</div>
                <div class="tarot-hint">탭하여 확인</div>
              </div>
              <div class="tarot-face tarot-front-face" style="background:#fff; box-shadow:inset 0 0 0 2px ${c.c1}30;">
                <div class="tarot-inner-border" style="border:1px solid ${c.c1}25;"></div>
                <div class="tarot-front-q">지녀야 할<br>행운 아이템은</div>
                <div class="tarot-value-wrap">
                  <div class="tarot-front-value" style="color:${c.c1};">${fortune.luckyItem}</div>
                </div>
              </div>
            </div>
          </div>
          <div class="tarot-card" id="tcard-2" onclick="flipTarot(2)">
            <div class="tarot-card-inner">
              <div class="tarot-face tarot-back-face" style="background:${c.c1};">
                <div class="tarot-inner-border" style="border:1px solid ${c.c2}50;"></div>
                <div class="tarot-symbol" style="color:${c.c2};">☀</div>
                <div class="tarot-card-name">카드 C</div>
                <div class="tarot-hint">탭하여 확인</div>
              </div>
              <div class="tarot-face tarot-front-face" style="background:#fff; box-shadow:inset 0 0 0 2px ${c.c1}30;">
                <div class="tarot-inner-border" style="border:1px solid ${c.c1}25;"></div>
                <div class="tarot-front-q">오늘의<br>행운 한 마디</div>
                <div class="tarot-value-wrap">
                  <div class="tarot-front-value" style="color:${c.c1};">"${fortune.luckyMsg}"</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="btn-wrap">
        <button class="btn" style="background:linear-gradient(135deg,${c.c1},${c.c2});box-shadow:0 6px 24px ${c.c1}40;" onclick="showFeedbackModal()">다시 하기</button>
      </div>
    </div>`;
}

function showFeedbackModal() {
  const options = ['매우 그렇다', '그렇다', '보통이다', '아니다', '매우 아니다'];
  const optionsHTML = options.map((label, i) => `
    <button class="feedback-btn" onclick="closeFeedbackModal()">
      <span class="feedback-num">${5 - i}</span>
      <span class="feedback-label">${label}</span>
    </button>`).join('');

  const overlay = document.createElement('div');
  overlay.id = 'feedback-overlay';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <p class="feedback-q">평소에 생각하던 나와<br>얼마나 같은가요?</p>
      <div class="feedback-scale">${optionsHTML}</div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeFeedbackModal() {
  const el = document.getElementById('feedback-overlay');
  if (el) el.remove();
  renderIntro();
}

renderIntro();
</script>
</body>
</html>
