<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>мЛђл¶ђнЕМмК§нКЄ вАФ лВШлКФ мЦілЦ§ мВђлЮМмЭЉкєМ?</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'HeirofLight';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/HeirofLightBold.woff') format('woff');
      font-weight: 700;
      font-display: swap;
    }
  </style>
  <style>
    @font-face {
      font-family: 'MapleStory';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@2.1/MaplestoryOTFBold.woff') format('woff');
      font-weight: bold;
      font-style: normal;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f8ff, #e6f4ff, #f5faff);
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
      color: #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      transition: background 0.7s ease;
    }

    .container {
      width: 100%;
      max-width: 920px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* вФАвФА нФДл°ЬкЈЄл†ИмК§ вФАвФА */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .progress-track {
      flex: 1; height: 6px;
      background: rgba(0,0,0,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3196FF, #24BEF0);
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .progress-text { font-size: 0.85rem; color: #7878a8; white-space: nowrap; }

    /* вФАвФА нОШмЭімІА нГАмЭінЛА вФАвФА */
    .page-title {
      font-size: 1.75rem; font-weight: 800; text-align: center;
      background: linear-gradient(90deg, #3196FF, #24BEF0);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .page-subtitle { font-size: 0.9rem; color: #7878a8; text-align: center; margin-bottom: 32px; }

    /* вФАвФА мєілУЬ кЈЄл¶ђлУЬ вФАвФА */
    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 34px;
      max-width: 634px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      position: relative;
      width: 148px;
      background: #ffffff;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      padding: 14px 10px 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      user-select: none;
      touch-action: manipulation;
    }
    .card:hover {
      border-color: #3196FF;
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(49,150,255,0.25);
    }
    @media (hover: none) {
      .card:hover {
        border-color: #e0e0e0;
        transform: none;
        box-shadow: none;
      }
    }
    .card.selected {
      background: #eef6ff;
      border-color: #3196FF;
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(49,150,255,0.35);
    }
    .card-img-wrap {
      width: 100%; aspect-ratio: 1;
      border-radius: 10px; overflow: hidden;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      mix-blend-mode: multiply;
      transform: scale(1.07);
    }
    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #bbb;
    }
    .card-label {
      font-size: 0.9rem; font-weight: 700;
      color: #333; text-align: center;
    }
    .card.selected .card-label { color: #1a7ae0; }

    .card .check-badge {
      display: none;
      position: absolute; top: 8px; right: 8px;
      width: 22px; height: 22px;
      background: #3196FF; border-radius: 50%;
      align-items: center; justify-content: center;
      font-size: 12px; color: #fff; font-weight: 900;
    }
    .card.selected .check-badge { display: flex; }

    /* вФАвФА нФДл¶∞нКЄ(PDF м†АмЮ•) вФАвФА */
    @media print {
      body > *:not(#app) { display: none !important; }
      .cloud-bg, .progress-wrap { display: none !important; }
      .btn-wrap, .celeb-box { display: none !important; }
      .result { box-shadow: none !important; }
      body { background: white !important; padding: 0 !important; }
    }
    /* вФАвФА л≤ДнКЉ вФАвФА */
    .btn-wrap { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    /* к≤∞к≥Љ нОШмЭімІА нХШлЛ® к≥†м†Х л≤ДнКЉ л∞Ф */
    .result-btn-bar {
      position: fixed; bottom: 0; left: 0; width: 100%;
      height: 88px;
      display: flex; align-items: center; justify-content: center;
      gap: 0;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.06);
      z-index: 200;
    }
    .result-bar-btn {
      flex: 1; height: 100%;
      border: none; background: none; cursor: pointer;
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.02em;
      transition: background 0.15s;
      position: relative;
    }
    .result-bar-btn:not(:last-child)::after {
      content: ''; position: absolute; right: 0; top: 20%; height: 60%;
      width: 1px; background: rgba(0,0,0,0.08);
    }
    .result-bar-btn:hover { background: rgba(0,0,0,0.04); }
    .result-bar-btn:active { background: rgba(0,0,0,0.08); }
    /* к≤∞к≥Љ нОШмЭімІА нХШлЛ® л∞Ф к≥µк∞Д нЩХл≥і */
    .result-bottom-spacer { height: 100px; }
    .btn-hist {
      padding: 12px 32px; font-size: 0.95rem; font-weight: 700;
      border: 2px solid #3196FF; border-radius: 50px;
      background: #fff; color: #3196FF; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.04em;
    }
    .btn-hist:hover { background: #3196FF; color: #fff; }

    /* вФАвФА кЄ∞л°Э нЩФл©і вФАвФА */
    .history-screen { padding: 24px 20px 60px; max-width: 700px; margin: 0 auto; }
    .history-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .history-title { font-size: 1.4rem; font-weight: 800; color: #2a3a50; }
    .hist-count { font-size: 0.85rem; color: #7890a8; margin-bottom: 16px; }
    .hist-btn {
      padding: 8px 16px; font-size: 0.82rem; font-weight: 700;
      border: 1.5px solid #3196FF; border-radius: 20px;
      background: #fff; color: #3196FF; cursor: pointer; transition: all 0.18s;
    }
    .hist-btn:hover { background: #3196FF; color: #fff; }
    .hist-btn-dl { border-color: #24BEF0; color: #24BEF0; }
    .hist-btn-dl:hover { background: #24BEF0; color: #fff; }
    .hist-btn-clear { border-color: #ff6b6b; color: #ff6b6b; }
    .hist-btn-clear:hover { background: #ff6b6b; color: #fff; }
    .hist-list { display: flex; flex-direction: column; gap: 10px; }
    .hist-row {
      background: #fff; border-radius: 14px;
      padding: 14px 18px; box-shadow: 0 2px 10px rgba(49,150,255,0.08);
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px;
    }
    .hist-date { font-size: 0.78rem; color: #9aabbb; flex-shrink: 0; }
    .hist-type { font-size: 1rem; font-weight: 700; color: #2a3a50; }
    .hist-cards { font-size: 0.8rem; color: #7890a8; flex: 1 1 100%; margin-top: 2px; }

    .btn {
      padding: 16px 56px; font-size: 1.1rem; font-weight: 700;
      border: none; border-radius: 50px;
      background: linear-gradient(135deg, #3196FF, #24BEF0);
      color: #fff; cursor: pointer;
      box-shadow: 0 6px 24px rgba(49,150,255,0.4);
      transition: all 0.2s; letter-spacing: 0.04em;
    }
    .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(49,150,255,0.5); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* вФАвФА мЭЄнКЄл°Ь вФАвФА */
    .intro { text-align: center; padding: 20px 20px 50px; position: relative; }
    .intro-logo {
      position: absolute;
      top: 0; left: 0;
      width: 120px;
    }
    .character-wrap {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 520px;
    }
    .character-img {
      width: 200px;
      position: relative;
      z-index: 2;
      margin-bottom: -60px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
      transform-origin: 50% 85%;
      animation: handWave 1.8s ease-in-out infinite;
    }
    @keyframes handWave {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(6deg); }
      40%  { transform: rotate(-5deg); }
      60%  { transform: rotate(5deg); }
      80%  { transform: rotate(-4deg); }
      100% { transform: rotate(0deg); }
    }
    .bonus-banner {
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #eef6ff, #e0f0ff);
      border: 1.5px solid rgba(49,150,255,0.25);
      border-radius: 14px;
      padding: 12px 16px;
      margin-top: 31px;
      text-align: left;
    }
    .bonus-img {
      width: 88px; flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(49,150,255,0.2));
    }
    .bonus-text { font-size: 0.82rem; color: #3a4a70; line-height: 1.55; }
    .bonus-text strong { color: #3196FF; font-weight: 800; }
    .memo-paper {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border-radius: 20px;
      padding: 72px 36px 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .memo-paper::before {
      content: '';
      position: absolute;
      top: 14px; left: 50%; transform: translateX(-50%);
      width: 40px; height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
    }
    .intro-title {
      font-family: 'MapleStory', 'Pretendard', sans-serif;
      font-size: 2.8rem; font-weight: 900; line-height: 1.25;
      background: linear-gradient(90deg, #3196FF, #24BEF0, #3196FF);
      background-size: 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite; margin-bottom: 20px;
      letter-spacing: -0.01em;
      white-space: nowrap;
      filter: drop-shadow(0 2px 14px rgba(49,150,255,0.28));
    }
    @keyframes shine { to { background-position: 200% center; } }
    .intro-desc { font-size: 0.98rem; color: #5a6080; line-height: 1.9; margin-bottom: 28px; }

    /* вФАвФА к≤∞к≥Љ вФАвФА */
    .result { text-align: center; }
    .result-mobile-top { display: none; }

    /* мГБлЛ®: мЇРл¶≠нД∞ + л©Фл™® мєілУЬ */
    .result-header {
      display: flex;
      align-items: flex-end;
      gap: 0;
      margin-bottom: 28px;
    }
    .result-char-img {
      width: 88px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      margin-right: -20px;
      margin-bottom: 11px;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.13));
    }
    .result-memo {
      flex: 1;
      background: #ffffff;
      border-radius: 20px;
      padding: 22px 24px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .result-memo::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 5px;
      background: #e0e0e0; border-radius: 3px;
    }
    .result-label { font-size: 0.82rem; color: #7878a8; letter-spacing: 0.1em; margin-bottom: 4px; }
    .result-nickname { font-size: 0.9rem; font-weight: 700; color: #5a5a8a; letter-spacing: 0.05em; margin-bottom: 4px; }
    .nickname-wrap { margin-bottom: 14px; text-align: center; }
    .nickname-label { font-size: 0.82rem; color: #7878a8; display: block; margin-bottom: 8px; }
    .nickname-row { display: flex; justify-content: center; }
    .nickname-input { border: 2px solid #d8d8f0; border-radius: 20px; padding: 8px 18px; font-size: 0.95rem; font-family: inherit; color: #2a2a4a; outline: none; text-align: center; width: 180px; background: #fafaff; transition: border-color 0.2s; }
    .nickname-input:focus { border-color: #a0a0e0; }
    .nickname-input::placeholder { color: #b8b8d8; }
    .result-title {
      font-family: 'MapleStory', 'Pretendard', sans-serif;
      font-size: 2.5rem; font-weight: 900; margin-bottom: 14px; line-height: 1.2;
      background: linear-gradient(90deg, #3196FF, #24BEF0);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .keywords {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 6px;
    }
    .keyword {
      padding: 4px 12px; border-radius: 50px;
      background: rgba(49,150,255,0.1);
      border: 1px solid rgba(49,150,255,0.4);
      color: #1a7ae0; font-size: 0.8rem; font-weight: 700;
    }
    .result-desc {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px; padding: 22px 26px;
      font-size: 0.98rem; color: #4a5068;
      line-height: 1.85; text-align: left; margin-bottom: 20px;
      white-space: pre-line;
    }
    .result-picks-title {
      font-size: 1rem; font-weight: 700;
      color: #1a7ae0; margin-bottom: 20px;
      letter-spacing: 0.05em;
    }
    .result-picks {
      display: flex; justify-content: center;
      flex-wrap: wrap; gap: 20px; margin-bottom: 36px;
    }
    .pick {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .pick-img-wrap {
      width: 130px; height: 130px;
      border-radius: 14px; overflow: hidden;
      background: #fff;
      border: 3px solid rgba(49,150,255,0.5);
      box-shadow: 0 6px 18px rgba(49,150,255,0.18);
      display: flex; align-items: center; justify-content: center;
    }
    .pick-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      mix-blend-mode: multiply;
      transform: scale(1.07);
    }
    .pick-label { font-size: 0.9rem; font-weight: 700; color: #2a2a4a; }
    .pick-page { font-size: 0.72rem; color: #888; }

    /* вФАвФА нГАл°Ь мєілУЬ вФАвФА */
    .tarot-section {
      border-radius: 20px;
      padding: 22px 20px 24px;
      margin-bottom: 32px;
      text-align: center;
    }
    .tarot-title {
      font-family: 'MapleStory', 'Pretendard', sans-serif;
      font-size: 2rem; font-weight: 800;
      letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .tarot-subtitle {
      font-size: 0.76rem; color: #aaa; margin-bottom: 20px;
    }
    /* вФАвФА нГАл°Ь к≤МмЮД: лґАм±ДкЉі нОЉмєШкЄ∞ вФАвФА */
    .tarot-fan-container {
      position: relative;
      height: 280px;
      margin: -38px auto 7px;
      overflow: visible;
      transform: translateY(-115px);
    }
    /* нМђ мєілУЬ лЮШнНЉ: нХШлЛ® м§СмХЩмЧРмДЬ нЪМм†Д */
    .spread-wrap {
      position: absolute;
      bottom: 0;
      left: calc(50% - 34px);
      width: 68px;
      transform-origin: 34px 290px;
      cursor: pointer;
      transition: filter 0.18s ease, transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }
    .spread-wrap:hover:not(.picked):not(.dimmed) {
      filter: brightness(1.35) drop-shadow(0 0 8px rgba(255,255,255,0.55));
    }
    .spread-wrap.picked {
      pointer-events: none;
      filter: brightness(0.45) saturate(0.2) sepia(0.3);
    }
    /* мД†нГЭ мІБнЫД мЮ†кєР мЬДл°Ь мШђлЭЉмШ§лКФ мГБнГЬ (JSл°Ь angle нПђнХ® transform мД§м†Х) */
    .spread-wrap.lift-up {
      filter: brightness(1.5) drop-shadow(0 0 14px rgba(255,215,80,0.8));
    }
    .spread-wrap.dimmed {
      pointer-events: none;
      filter: brightness(0.5) saturate(0.15);
      transition: filter 0.5s ease;
    }
    /* нМђ мєілУЬ л≥Єм≤і */
    .fan-card-inner {
      position: relative;
      width: 68px; height: 105px;
      transform-style: preserve-3d;
      border-radius: 9px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.35);
    }
    .fan-face {
      position: absolute; inset: 0;
      border-radius: 9px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .fan-inner-border {
      position: absolute; inset: 5px;
      border-radius: 6px; pointer-events: none;
    }
    .fan-symbol { font-size: 1.15rem; line-height: 1; }
    /* вФАвФА мєілУЬ лТЈл©і лЛ§нБђ мЛ†лєД мК§нГАмЭЉ вФАвФА */
    .card-back-dark {
      background: radial-gradient(ellipse at 50% 40%, #2d1f45, #0d0818 80%);
      box-shadow: inset 0 0 0 1.5px #c9a228, inset 0 0 0 3.5px rgba(201,162,40,0.18);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
    }
    .card-back-dark::before {
      content: '';
      position: absolute; inset: 5px;
      border: 0.5px solid rgba(201,162,40,0.4);
      border-radius: 6px; pointer-events: none;
    }
    .card-back-symbol {
      font-size: 1.1rem; color: #c9a228;
      text-shadow: 0 0 10px rgba(201,162,40,0.7);
      line-height: 1; z-index: 1;
    }
    .card-back-stars {
      font-size: 0.55rem; color: rgba(201,162,40,0.55);
      letter-spacing: 3px; z-index: 1;
    }
    /* мКђл°ѓ лТЈл©і лЛ§нБђ */
    .slot-back-dark {
      background: radial-gradient(ellipse at 50% 40%, #2d1f45, #0d0818 80%);
      box-shadow: inset 0 0 0 2px #c9a228, inset 0 0 0 5px rgba(201,162,40,0.15);
    }
    .slot-back-dark::before {
      content: '';
      position: absolute; inset: 8px;
      border: 0.8px solid rgba(201,162,40,0.35);
      border-radius: 8px; pointer-events: none;
    }
    /* мКђл°ѓ нЦЙ */
    .tarot-slots-row {
      display: flex; justify-content: center; gap: 18px;
      margin-top: 8px; flex-wrap: wrap;
    }
    .tarot-slot-wrap { text-align: center; }
    .tarot-slot {
      width: 132px; height: 198px;
      border: 2px dashed rgba(120,120,168,0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: border-color 0.3s ease;
    }
    .tarot-slot .slot-empty-num {
      font-size: 2.2rem; font-weight: 900;
      color: rgba(120,120,168,0.25);
    }
    /* мКђл°ѓмЧР лУ§мЦік∞Д мєілУЬ */
    .slot-card {
      width: 132px; height: 198px;
      position: relative;
      perspective: 700px;
      cursor: default;
    }
    .slot-card.flippable { cursor: pointer; }
    .slot-card-inner {
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
    }
    .slot-card.flipped .slot-card-inner { transform: rotateY(180deg); }
    .slot-face {
      position: absolute; inset: 0;
      border-radius: 16px;

function resetScores() {
  totalScores = {energy:0,creativity:0,stability:0,social:0,

function getResult() {
  const s = totalScores;
  const e1 = s.energy  >= s.stability   ? 'E' : 'S';
  const e2 = s.social  >= s.analytical  ? 'R' : 'A';
  const e3 = s.creativity >= s.leadership ? 'C' : 'L';
  const e4 = s.freedom >= s.sensitivity ? 'F' : 'M';
  const code = e1 + e2 + e3 + e4;
  return resultTypes.find(r => r.key === code) || resultTypes[0];
}

function _autoFitSlotText(slotIdx) {
  const el = document.getElementById('slot-val-' + slotIdx);
  if (!el) return;
  const wrap = el.parentElement;
  if (!wrap) return;
  const MIN_PX = 7;
  let size = parseFloat(window.getComputedStyle(el).fontSize) || 16.8;
  // к∞Хм†Ьл°Ь мХЮл©імЭД мЮ†кєР к∞АмЛЬнЩФнХімДЬ мЄ°м†Х
  el.style.fontSize = size + 'px';
  while (size > MIN_PX && el.scrollHeight > wrap.clientHeight + 2) {
    size -= 0.5;
    el.style.fontSize = size + 'px';
  }
}

function initTarotSpread() {
  const spread = document.getElementById('tarot-spread');
  if (!spread) return;
  _tarotPickCount = 0;

  const section = document.getElementById('tarot-section');
  const bg  = section ? section.dataset.color1 || '#3a2d6e' : '#3a2d6e';
  const c2  = section ? section.dataset.color2 || '#d4af37' : '#d4af37';

  spread.innerHTML = '';

  const totalAngle = 90;
  const startAngle = -totalAngle / 2;
  const step = totalAngle / (_TAROT_TOTAL - 1);

  for (let i = 0; i < _TAROT_TOTAL; i++) {
    const angle = startAngle + step * i;
    // z-index: лІИмІАлІЙ(мШ§л•Єм™љ) мєілУЬк∞А к∞АмЮ• мЬД
    const zIdx = i + 1;

    const wrap = document.createElement('div');
    wrap.className = 'spread-wrap';

function pickTarotCard(idx, bg, c2) {
  if (_tarotPickCount >= 3) return;
  const wrap = document.getElementById(`spread-wrap-${idx}`);
  if (!wrap || wrap.classList.contains('picked')) return;

  _tarotPickCount++;
  const slotIdx = _tarotPickCount - 1;

  // мД†нГЭ м¶ЙмЛЬ мЬДл°Ь 6px(вЙИ1.5mm) lift мХ†лЛИл©ФмЭімЕШ
  const angle = wrap.dataset.angle || 0;
  wrap.classList.add('lift-up');
  wrap.style.transform = `rotate(${angle}deg) translateY(-6px)`;

  // мХљк∞Д нЫДмЧР picked мГБнГЬ(мЦілС°к≤М)л°Ь м†ДнЩШ
  setTimeout(() => {
    wrap.classList.remove('lift-up');
    wrap.classList.add('picked');
    wrap.style.transform = `rotate(${angle}deg) translateY(-6px)`;
  }, 320);

  // мКђл°ѓмЧР мєілУЬ м±ДмЪ∞кЄ∞
  _fillSlot(slotIdx, bg, c2);

  // мХИлВі лђЄкµђ
  const inst = document.getElementById('tarot-instruction');
  if (inst) {
    if (_tarotPickCount === 1) inst.innerHTML = 'вЬ¶ лСР л≤ИмІЄ мєілУЬл•Љ к≥®лЭЉм£ЉмДЄмЪФ <span style="font-size:0.78rem;color:#9898b8;">нХЬ л≤И к≥†л•іл©і лЛ§мЛЬ л∞ФкњА мИШ мЧЖмЬЉлЛИ мЛ†м§СнХШк≤М!</span>';
    else if (_tarotPickCount === 2) inst.textContent = 'вЬ¶ лІИмІАлІЙ мєілУЬл•Љ к≥®лЭЉм£ЉмДЄмЪФ';
    else {
      // лВШл®ЄмІА нМђ мєілУЬ мЦілС°к≤М (dimmed вАФ к≤Ам†Х мХДлЛМ мГЙ)
      for (let i = 0; i < _TAROT_TOTAL; i++) {
        const w = document.getElementById(`spread-wrap-${i}`);
        if (w && !w.classList.contains('picked')) {
          w.classList.add('dimmed');
        }
      }
      inst.textContent = 'вЬ¶ мєілУЬл•Љ нХЬ мЮ•мФ© нГ≠нХімДЬ к≤∞к≥Љл•Љ нЩХмЭЄнХШмДЄмЪФ!';
    }
  }
}

function _fillSlot(slotIdx, bg, c2) {
  const slot = document.getElementById(`slot-${slotIdx}`);
  if (!slot) return;

  const section = document.getElementById('tarot-section');
  const luckyTime = section ? section.dataset.luckyTime : '';
  const luckyItem = section ? section.dataset.luckyItem : '';
  const luckyMsg  = section ? section.dataset.luckyMsg  : '';
  const values = [luckyTime, luckyItem, luckyMsg];

  const info   = _SLOT_CONTENTS[slotIdx];
  const val    = values[slotIdx];

  slot.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'slot-card flippable pop-in';
  card.id = `slot-card-${slotIdx}`;
  card.innerHTML = `
    <div class="slot-card-inner">

      </div>
      <div class="slot-face slot-front-face" style="background:linear-gradient(160deg,#f5f0ff 0%,#fffbef 40%,#eff6ff 75%,#fdf0ff 100%);box-shadow:inset 0 0 0 2px ${bg}30;">

        </div>
      </div>
    </div>`;

  card.addEventListener('click', () => _flipSlotCard(slotIdx));
  slot.appendChild(card);

  // нЦЙмЪі нХЬлІИлФФ(мКђл°ѓ2) нЕНмК§нКЄ мЮРлПЩ мґХмЖМ
  if (slotIdx === 2) {

  setTimeout(() => card.classList.remove('pop-in'), 400);
}

function _flipSlotCard(slotIdx) {
  const card = document.getElementById(`slot-card-${slotIdx}`);
  if (!card || !card.classList.contains('flippable')) return;
  card.classList.toggle('flipped');
}

function triggerColorEffect(cardEl, colorLabel) {
  const effect = colorEffects[colorLabel];
  if (!effect) return;

  const rect = cardEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = 22;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    const shape = effect.shapes[Math.floor(Math.random() * effect.shapes.length)];
    const color = effect.colors[Math.floor(Math.random() * effect.colors.length)];
    const size = 14 + Math.random() * 26;
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.6;
    const dist = 80 + Math.random() * 130;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const duration = 700 + Math.random() * 500;
    const delay = Math.random() * 180;
    const rotate = (Math.random() - 0.5) * 540;

    el.style.cssText = `
      position:fixed;
      left:${cx}px; top:${cy}px;
      font-size:${size}px;
      color:${color};
      pointer-events:none;
      z-index:9999;
      user-select:none;
      transform:translate(-50%,-50%) rotate(0deg) scale(1);
      opacity:1;
      transition:transform ${duration}ms cubic-bezier(.2,.8,.4,1) ${delay}ms,
                 opacity ${duration * 0.6}ms ease ${delay + duration * 0.4}ms;
      will-change:transform,opacity;
      line-height:1;
      text-shadow: 0 2px 8px ${color}88;
    `;
    el.textContent = shape;
    document.body.appendChild(el);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${rotate}deg) scale(${0.4 + Math.random() * 0.8})`;
        el.style.opacity = '0';
      });
    });

    setTimeout(() => el.remove(), duration + delay + 100);
  }

  // мєілУЬ мЮРм≤і нОДмК§ нЪ®к≥Љ
  cardEl.style.transition = 'transform 0.15s ease';
  cardEl.style.transform = 'scale(1.1)';
  setTimeout(() => { cardEl.style.transform = ''; }, 200);
}

let _swAnimId = null;

  if (_swAnimId) { cancelAnimationFrame(_swAnimId); _swAnimId = null; }

function _lerpColor(c1, c2, t) {
  const p = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const [r1,g1,b1] = p(c1), [r2,g2,b2] = p(c2);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}
function _buildSoundWave(parent) {
  const barCount = 52;
  const palette = ['#FF8C00','#FF4D6D','#C77DFF','#5C7AFF','#38BDF8'];
  const wrap = document.createElement('div');

  const barEls = [], hs = new Float32Array(barCount), tgts = new Float32Array(barCount), spds = new Float32Array(barCount);
  for (let i = 0; i < barCount; i++) {
    const t = i / (barCount - 1);
    const ci = t * (palette.length - 1);
    const c1 = palette[Math.floor(ci)], c2 = palette[Math.min(Math.floor(ci)+1, palette.length-1)];
    const col = _lerpColor(c1, c2, ci - Math.floor(ci));
    const posM = Math.sin(Math.PI * t);
    const bar = document.createElement('div');
    hs[i] = 6; tgts[i] = 10 + Math.random() * (30 + posM * 70); spds[i] = 0.08 + Math.random() * 0.12;
    bar.style.cssText = `width:6px;height:6px;border-radius:3px;background:${col};box-shadow:0 0 5px ${col}99;flex-shrink:0;`;
    wrap.appendChild(bar); barEls.push(bar);
  }
  parent.appendChild(wrap);

  function tick() {
    for (let i = 0; i < barCount; i++) {
      hs[i] += (tgts[i] - hs[i]) * spds[i];
      if (Math.abs(hs[i] - tgts[i]) < 1.2) {
        const posM = Math.sin(Math.PI * i / (barCount - 1));
        tgts[i] = 5 + Math.random() * (25 + posM * 80);
        spds[i] = 0.06 + Math.random() * 0.14;
      }
      barEls[i].style.height = Math.max(4, hs[i]) + 'px';
    }
    _swAnimId = requestAnimationFrame(tick);
  }
  _swAnimId = requestAnimationFrame(tick);
}

// вФАвФА мВђмЪілУЬ нХ©мД± нЧђнНЉ вФАвФА
function _mkNoiseBuf(ac, dur) {
  const n = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
function _mkNoiseBufCorr(ac, dur, corr) {
  // correlated noise (smoother texture for scraping)
  const n = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const d = buf.getChannelData(0); let prev = 0;
  for (let i = 0; i < n; i++) { prev = prev * corr + (Math.random()*2-1) * (1 - corr); d[i] = prev; }
  return buf;
}
function _schedNoise(ac, t, dur, fType, fFreq, fQ, vol, volEnd) {
  try {
    const src = ac.createBufferSource(); src.buffer = _mkNoiseBuf(ac, dur);
    const flt = ac.createBiquadFilter(); flt.type = fType; flt.frequency.value = fFreq; flt.Q.value = fQ || 2;
    const g = ac.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(Math.max(volEnd||0.001, 0.0001), t + dur);
    src.connect(flt); flt.connect(g); g.connect(ac.destination);
    src.start(t); src.stop(t + dur + 0.01);
  } catch(e) {}
}

function playItemSound(type) {
  const ac = _getAC(); if (!ac) return;
  try {
    switch (type) {
      // кЄ∞л≥Є нБіл¶≠
      case 'click': {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination); o.type = 'sine'; o.frequency.value = 900;
        g.gain.setValueAtTime(0.25, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.07);
        o.start(); o.stop(ac.currentTime + 0.07); break;
      }
      // м±Е: мҐЕмЭі лДШкЄ∞лКФ мЖМл¶ђ (3нЪМ мЧ∞мЖН лє†л•Є лІИм∞∞мЭМ)
      case 'book_flip': {
        for (let i = 0; i < 4; i++) {
          const t = ac.currentTime + i * 0.11;
          _schedNoise(ac, t, 0.08, 'bandpass', 5000 - i*400, 1.5, 0.22, 0.001);
          _schedNoise(ac, t, 0.06, 'highpass', 8000, 1, 0.08, 0.001);
        }
        break;
      }
      // к∞Ал∞©: мІАнНЉ мЧђлКФ мЖМл¶ђ (к≥†м£ЉнММ лЮШнЛА мЧЕмК§мЬХ)
      case 'bag_zipper': {
        const count = 30; const dur = 0.65;
        for (let i = 0; i < count; i++) {
          const t = ac.currentTime + (i / count) * dur;
          const fq = 1800 + (i / count) * 2200;
          _schedNoise(ac, t, 0.014, 'bandpass', fq, 8, 0.14, 0.001);
        }
        break;
      }
      // мЪ∞мВ∞: лєЧл∞©мЪЄмЭі мЪ∞мВ∞мЧР лІЮлКФ мЖМл¶ђ
      case 'umbrella_rain': {
        // л∞∞к≤љ лєЧмЖМл¶ђ
        _schedNoise(ac, ac.currentTime, 2.2, 'highpass', 2500, 1, 0.05, 0.001);
        // лєЧл∞©мЪЄ мґ©к≤©мЭМ
        for (let i = 0; i < 40; i++) {
          const t = ac.currentTime + Math.random() * 2.0;
          const fq = 3000 + Math.random() * 4000;
          _schedNoise(ac, t, 0.015 + Math.random()*0.025, 'bandpass', fq, 3, 0.1 + Math.random()*0.1, 0.001);
        }
        break;
      }
      // мЛЬк≥Д: лШСлФ± мЖМл¶ђ (кЈЬмєЩм†Б нЛ±нЖ°)
      case 'clock_tick': {
        for (let i = 0; i < 7; i++) {
          const t = ac.currentTime + i * 0.48;
          const isOdd = i % 2 === 0;
          _schedNoise(ac, t, 0.018, 'bandpass', isOdd ? 2200 : 1700, 12, 0.32, 0.001);
          // к≥µл™Е нЖ§
          const o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination); o.type = 'sine'; o.frequency.value = isOdd ? 900 : 700;
          g.gain.setValueAtTime(0.07, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
          o.start(t); o.stop(t + 0.06);
        }
        break;
      }
      // мЭШмЮР: мЭШмЮР лБДлКФ мЖМл¶ђ (м†АмЧ≠ лІИм∞∞, лґАлУЬлЯљк≤М)
      case 'chair_drag': {
        const dur = 1.1;
        const n = Math.floor(ac.sampleRate * dur);
        const buf = _mkNoiseBufCorr(ac, dur, 0.72);
        const src = ac.createBufferSource(); src.buffer = buf;
        const flt = ac.createBiquadFilter(); flt.type = 'bandpass';
        flt.frequency.setValueAtTime(350, ac.currentTime); flt.frequency.exponentialRampToValueAtTime(160, ac.currentTime + dur); flt.Q.value = 1.5;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.001, ac.currentTime); g.gain.linearRampToValueAtTime(0.18, ac.currentTime + 0.12);
        g.gain.setValueAtTime(0.18, ac.currentTime + dur - 0.18); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
        src.connect(flt); flt.connect(g); g.connect(ac.destination);
        src.start(); src.stop(ac.currentTime + dur);
        break;
      }
      // мЛ†л∞Ь: лЫ∞лКФ л∞ЬмЮРкµ≠ мЖМл¶ђ
      case 'shoe_run': {
        const steps = [0, 0.27, 0.5, 0.74, 0.95];
        steps.forEach(offset => {
          const t = ac.currentTime + offset;
          // м†АмЧ≠ мґ©к≤©
          const o = ac.createOscillator(), og = ac.createGain();
          o.connect(og); og.connect(ac.destination); o.type = 'sine';
          o.frequency.setValueAtTime(130, t); o.frequency.exponentialRampToValueAtTime(50, t + 0.12);
          og.gain.setValueAtTime(0.5, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
          o.start(t); o.stop(t + 0.14);
          // нСЬл©і лІИм∞∞
          _schedNoise(ac, t, 0.05, 'bandpass', 350, 2, 0.18, 0.001);
        });
        break;
      }
      // к±∞мЪЄ: лЛ¶лКФ мЖМл¶ђ (к≥†мЭМ лІИм∞∞, мХљк∞Д лБљлБљ)
      case 'mirror_wipe': {
        const dur = 1.3;
        const n = Math.floor(ac.sampleRate * dur);
        const buf = ac.createBuffer(1, n, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) {
          // LFOл°Ь лЛ¶лКФ мЩХл≥µ л™®мЕШ нСЬнШД
          const lfo = Math.abs(Math.sin(i / ac.sampleRate * 5 * Math.PI));
          d[i] = (Math.random()*2-1) * (0.3 + 0.7 * lfo);
        }
        const src = ac.createBufferSource(); src.buffer = buf;
        const flt = ac.createBiquadFilter(); flt.type = 'bandpass';
        flt.frequency.setValueAtTime(3500, ac.currentTime); flt.frequency.exponentialRampToValueAtTime(5500, ac.currentTime + dur * 0.5);
        flt.frequency.exponentialRampToValueAtTime(3800, ac.currentTime + dur); flt.Q.value = 3;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.001, ac.currentTime); g.gain.linearRampToValueAtTime(0.16, ac.currentTime + 0.1);
        g.gain.setValueAtTime(0.16, ac.currentTime + dur - 0.12); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
        src.connect(flt); flt.connect(g); g.connect(ac.destination);
        src.start(); src.stop(ac.currentTime + dur);
        break;
      }
    }
  } catch(e) {}
}

      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      const w = 20, h = 40;
      svg.setAttribute('width', w); svg.setAttribute('height', h);
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M12 2 L6 18 L11 18 L8 38 L18 14 L13 14 Z');
      path.setAttribute('fill',`hsl(${45+Math.random()*20},100%,60%)`);
      path.setAttribute('stroke','#fff'); path.setAttribute('stroke-width','0.5');
      svg.appendChild(path);
      svg.style.cssText = `
        position:fixed; left:${cx}px; top:${cy}px;
        pointer-events:none; z-index:9999;
        transform:translate(-50%,-50%) rotate(${angle*180/Math.PI+90}deg) scale(1);

                   opacity 0.3s ease ${0.35+i*0.04}s;
        filter:drop-shadow(0 0 6px #FFD600);
      `;
      document.body.appendChild(svg);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        svg.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${angle*180/Math.PI+90}deg) scale(0.5)`;
        svg.style.opacity = '0';
      }));
      setTimeout(() => svg.remove(), 900);
    }
    // л≤Им©Н нФМлЮШмЛЬ
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:fixed; left:${cx}px; top:${cy}px;

      transform:translate(-50%,-50%) scale(0);

    }));

  } else if (label === 'кµђл¶Д') {
    // мЖЬмВђнГХ кµђл¶Д лС•мЛ§лС•мЛ§
    const clouds = ['вШБпЄП','рЯМ•пЄП','вЫЕ','рЯМ§пЄП'];
    for (let i = 0; i < 10; i++) {
      const el = document.createElement('div');
      const size = 20 + Math.random() * 26;
      const startX = cx + (Math.random()-0.5) * 160;
      const dur = 1000 + Math.random() * 500;
      const floatX = (Math.random()-0.5)*80;
      el.style.cssText = `
        position:fixed; left:${startX}px; top:${cy}px;
        font-size:${size}px; line-height:1;
        pointer-events:none; z-index:9999;
        transform:translate(-50%,-50%) translateY(0) translateX(0) scale(0.3);
        opacity:0;
        transition:transform ${dur}ms cubic-bezier(.2,.8,.3,1) ${i*60}ms,
                   opacity 0.2s ease ${i*60}ms;
      `;
      el.textContent = clouds[i % clouds.length];
      document.body.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transform = `translate(-50%,-50%) translateY(-${80+Math.random()*60}px) translateX(${floatX}px) scale(1)`;
        el.style.opacity = '1';
      }));
      setTimeout(() => {
        el.style.transition = `opacity 0.5s ease`;

    }
  }

  // мєілУЬ нОДмК§
  cardEl.style.transition = 'transform 0.15s ease';
  cardEl.style.transform = 'scale(1.08)';
  setTimeout(() => { cardEl.style.transform = ''; }, 200);
}

function nextPage() {
  dismissCheerPopup();
  if (selectedCards[currentPage] === undefined) return;
  const card = pages[currentPage].cards[selectedCards[currentPage]];
  Object.entries(card.scores).forEach(([k, v]) => { totalScores[k] += v; });
  currentPage++;
  if (currentPage >= pages.length) renderResult();

}
